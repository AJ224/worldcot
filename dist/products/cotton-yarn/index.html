<!DOCTYPE html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Worldcot International — Cotton Yarn</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "secondary-container": "#d2e6bc",
              "on-primary": "#ffffff",
              "surface-container": "#ecefea",
              "inverse-primary": "#acd19a",
              "on-secondary-container": "#566846",
              "surface-tint": "#46673a",
              "surface-container-low": "#f2f4ef",
              "on-secondary-fixed": "#101f05",
              "tertiary-fixed": "#ffd8e8",
              "outline-variant": "#c3c8bc",
              "surface-container-high": "#e7e9e4",
              "primary-container": "#2e4d23",
              "tertiary-container": "#67354f",
              "surface-bright": "#f8faf5",
              "tertiary-fixed-dim": "#f7b3d2",
              "on-secondary-fixed-variant": "#3b4c2c",
              "on-primary-fixed": "#042100",
              "on-secondary": "#ffffff",
              "on-background": "#191c1a",
              "primary-fixed": "#c7edb4",
              "on-tertiary-fixed": "#350b24",
              "error-container": "#ffdad6",
              "background": "#f8faf5",
              "on-primary-container": "#99bd88",
              "tertiary": "#4d1f38",
              "on-surface-variant": "#43483f",
              "secondary": "#526442",
              "surface-variant": "#e1e3de",
              "outline": "#73796e",
              "primary-fixed-dim": "#acd19a",
              "on-tertiary-fixed-variant": "#693650",
              "surface-dim": "#d8dbd6",
              "surface-container-lowest": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#2f4e24",
              "surface-container-highest": "#e1e3de",
              "inverse-surface": "#2e312e",
              "secondary-fixed-dim": "#b9cda4",
              "on-tertiary-container": "#e2a0bf",
              "error": "#ba1a1a",
              "primary": "#18360e",
              "surface": "#f8faf5",
              "inverse-on-surface": "#eff1ec",
              "on-error-container": "#93000a",
              "secondary-fixed": "#d5e9bf",
              "on-surface": "#191c1a"
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Manrope"],
              label: ["Manrope"]
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .serif-tight {
        font-family: "Noto Serif";
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body selection:bg-secondary-container">
    <div id="site-navbar"></div>

    <main class="max-w-7xl mx-auto px-8 py-16">
      <nav class="text-sm text-on-surface-variant mb-8">
        <a class="hover:underline" href="/products/">Products</a>
        <span class="mx-2 opacity-50">/</span>
        <span class="text-on-surface">Cotton Yarn</span>
      </nav>

      <header class="mb-10">
        <h1 class="text-4xl md:text-5xl serif-tight font-bold text-primary mb-4">Cotton Yarn</h1>
        <p class="text-on-surface-variant max-w-3xl leading-relaxed">
          Overview, offerings, and certifications.
        </p>
      </header>

      <article id="yarn-content" class="rounded-2xl border border-outline-variant/20 bg-surface-container-lowest p-8 md:p-10"></article>
    </main>

    <script>
      (async () => {
        const mount = document.getElementById("yarn-content");
        if (!mount) return;

        try {
          const res = await fetch("/data/products.json", { cache: "no-store" });
          if (!res.ok) throw new Error("Failed to load products.json");
          const data = await res.json();

          const cat = (data.categories || []).find((c) => c.id === "cotton-yarn");
          const content = cat?.content || {};

          const paragraphs = (content.paragraphs || [])
            .map((p) => `<p class="text-on-surface-variant leading-relaxed">${p}</p>`)
            .join("");

          const offerings = (content.offerings || [])
            .map((x) => `<li class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">check</span><span>${x}</span></li>`)
            .join("");

          mount.innerHTML = `
            <h2 class="font-headline text-2xl text-primary mb-6">${content.title || "Cotton Yarn"}</h2>
            <div class="space-y-5 mb-10">${paragraphs}</div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
              <section class="rounded-xl bg-surface-container-low p-6 border border-outline-variant/15">
                <div class="text-xs uppercase tracking-widest text-outline mb-3">${content.offeringsTitle || "Offerings"}</div>
                <ul class="space-y-3 text-on-surface">${offerings}</ul>
              </section>
              <section class="rounded-xl bg-surface-container-low p-6 border border-outline-variant/15">
                <div class="text-xs uppercase tracking-widest text-outline mb-3">Certifications</div>
                <p class="text-on-surface-variant leading-relaxed">${content.certifications || ""}</p>
              </section>
            </div>
          `;
        } catch (e) {
          mount.innerHTML = `<p class="text-on-surface-variant">Cotton yarn data could not be loaded.</p>`;
        }
      })();
    </script>
    <div id="site-footer"></div>

    <script src="/shared/site-chrome.js"></script>
    <script>
      window.WorldcotChrome?.mount({ active: "products" });
    </script>
  </body>
</html>
